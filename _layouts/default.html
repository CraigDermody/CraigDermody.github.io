<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    <style>
      /* Global font */
      body {
        font-family: Arial, sans-serif;
      }

      /* Global link color */
      a {
        color: #2c446f;
      }
      a:hover {
        opacity: 0.85;
      }

      /* Ensure header links match too (Minima can override) */
      .site-header .site-nav a,
      .site-header a.page-link {
        color: #2c446f !important;
      }
    </style>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

  </body>

</html>
